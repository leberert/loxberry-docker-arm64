services:
  loxberry:
    build: .
    image: loxberry-arm64:latest
    container_name: loxberry
    hostname: loxberry
    restart: unless-stopped

    # systemd inside the container needs these
    privileged: true
    cgroup: host
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - loxberry_data:/opt/loxberry

    ports:
      - "80:80"      # Web UI (HTTP)
      - "443:443"    # Web UI (HTTPS)
      - "8022:22"    # SSH (host port 8022 to avoid conflict with host sshd)

volumes:
  loxberry_data:
